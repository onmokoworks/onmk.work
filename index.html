<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/style.css">
    <style>
        .about-text {
            line-height: 1.8;
            font-size: 0.95rem;
            letter-spacing: 0.01em;
            margin-bottom: 6vh;
        }

        .trigger {
            cursor: pointer;
            font-weight: 500;
            text-decoration: underline;
            text-underline-offset: 4px;
            text-decoration-color: #ddd;
            transition: color 0.2s;
        }
        .trigger:hover { text-decoration-color: var(--accent); color: var(--text-sub); }

        .content {
            display: inline-block;
            max-width: 0;
            opacity: 0;
            overflow: hidden;
            white-space: nowrap;
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            color: var(--text-sub);
            font-weight: 500;
            vertical-align: bottom;
        }
        .content.is-open { max-width: 1000px; opacity: 1; margin: 0 4px; }

        .external-link {
            color: var(--text-main);
            font-weight: 400;
            text-decoration: none;
            border-bottom: 1px solid #ddd;
        }

        .section-title {
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 30px;
            display: block;
        }

        .recent-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .recent-item { text-decoration: none; color: var(--text-main); }
        .recent-item:hover .recent-thumb img { opacity: 0.7; }

        .recent-thumb {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000;
            margin-bottom: 12px;
            overflow: hidden;
        }
        .recent-thumb img {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: opacity 0.3s;
        }

        .recent-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            letter-spacing: 0.01em;
        }

        @media (max-width: 768px) {
            .recent-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav class="nav-bar">
        <div class="nav-container">
            <a href="index.html" class="nav-icon">
                <img src="https://i.gyazo.com/b65650558543ca07d173b5dc840e2ed8.png" alt="icon">
            </a>
            <div class="nav-links">
                <a href="works.html" class="nav-link">works</a>
                <a href="about.html" class="nav-link">about</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="about-text">
            <span class="trigger" onclick="toggle(this)">おーん</span>
            <span class="content">
                （<span class="trigger" onclick="toggle(this); event.stopPropagation();">onmk</span><span class="content">　読み：おんもこ</span>）
            </span>
            は
            <span class="trigger" onclick="toggle(this)">映像作家</span>
            <span class="content">（で、主に3DCGやモーショングラフィックスを用いた映像制作をしている）</span>
            。
            <br>
            また、
            <span class="trigger" onclick="toggle(this)">複数のグループ</span>
            <span class="content">
                （<a href="https://x.com/hakumei_lab" class="external-link" target="_blank">hakumei</a> / .prism）
            </span>
            に所属し、
            <span class="trigger" onclick="toggle(this)">制作</span>
            <span class="content">（映像制作、同人活動）</span>
            をしている。
        </div>

        <hr>

        <section class="recently-works">
            <span class="section-title">Recently Works</span>
            <div class="recent-grid">
                <a href="#" class="recent-item">
                    <div class="recent-thumb">
                        <img src="https://i.gyazo.com/1086ede0a285287e912275e4e4d94527.png" alt="">
                    </div>
                    <div class="recent-info">
                        <span style="font-weight:500">妄想きゅきゅん (feat. MOSAIC.WAV)</span>
                    </div>
                </a>
                <a href="#" class="recent-item">
                    <div class="recent-thumb">
                        <img src="https://i.gyazo.com/fc36a5faf6c30e378816591fb091ee5c.png" alt="">
                    </div>
                    <div class="recent-info">
                        <span style="font-weight:500">ENDLESS DANCE</span>
                    </div>
                </a>
                <a href="#" class="recent-item">
                    <div class="recent-thumb">
                        <img src="https://i.gyazo.com/d55142988f2d821d6388f2f3040bbb9b.png" alt="">
                    </div>
                    <div class="recent-info">
                        <span style="font-weight:500">ずっと真夜中でいいのに。 - 形</span>
                    </div>
                </a>
                <a href="#" class="recent-item">
                    <div class="recent-thumb">
                        <img src="https://i.gyazo.com/32166dbaa43fbccb77378456de82d205.png" alt="">
                    </div>
                    <div class="recent-info">
                        <span style="font-weight:500">Aiobahn +81 feat. FUWAMOCO - side by side</span>
                    </div>
                </a>
            </div>
        </section>
    </div>

    <script>
        function toggle(el) {
            const content = el.nextElementSibling;
            if (content && content.classList.contains('content')) {
                content.classList.toggle('is-open');
            }
        }
    </script>
</body>
</html>
